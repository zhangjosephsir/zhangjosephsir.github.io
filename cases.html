<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案例点评 | 张大壮律师</title>
  <meta name="description" content="张大壮律师精选真实案例，劳动争议、合同纠纷、婚姻家庭等。">
  
  <style>
    :root {
      --gold: #B8860B;
      --gold-light: #D4A843;
      --bg: #FAFAFA;
      --white: #FFFFFF;
      --dark: #1A1A1A;
      --gray: #666;
      --light-gray: #999;
      --border: #EEEEEE;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--dark);
      line-height: 1.6;
    }
    
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(10px);
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    
    .nav-logo {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--dark);
    }
    
    .nav-links {
      display: flex;
      gap: 2rem;
    }
    
    .nav-links a {
      color: var(--gray);
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    .nav-links a:hover { color: var(--gold); }
    
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    
    #hero {
      padding: 7rem 0 2.5rem;
      text-align: center;
    }
    
    .hero-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    
    .hero-sub {
      color: var(--gray);
      font-size: 0.95rem;
    }
    
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }
    
    .case-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .case-card {
      background: var(--white);
      border-radius: 10px;
      padding: 1.5rem;
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.2s;
    }
    
    .case-card:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 16px rgba(184,134,11,0.1);
    }
    
    .case-tag {
      display: inline-block;
      background: rgba(184,134,11,0.1);
      color: var(--gold);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
    }
    
    .case-card h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    
    .case-card p {
      font-size: 0.9rem;
      color: var(--gray);
    }
    
    .more-hint {
      text-align: center;
      padding: 2.5rem 0;
      color: var(--light-gray);
      font-size: 0.9rem;
    }
    
    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--light-gray);
      font-size: 0.8rem;
    }
    
    footer a {
      color: var(--gold);
      text-decoration: none;
    }
    
    @media (max-width: 600px) {
      .nav-links { display: none; }
      #hero { padding: 6rem 0 2rem; }
      .hero-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">张大壮律师</div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="index.html#contact">咨询</a>
    </div>
  </nav>
  
  <div class="container">
    <section id="hero">
      <h1 class="hero-title">案例点评</h1>
      <p class="hero-sub">真实案例，深度分析</p>
    </section>
    
    <hr class="divider">
    
    <div class="case-list">
      <a href="case-01-tiaogang.html" class="case-card">
        <span class="case-tag">劳动争议</span>
        <h3>调岗降薪维权</h3>
        <p>公司单方调岗降薪，员工成功主张2N赔偿金。</p>
      </a>
      
      <a href="case-02-yiyuanche.html" class="case-card">
        <span class="case-tag">合同纠纷</span>
        <h3>1元购车案</h3>
        <p>"1元购车"法院判决值得商榷，律师深度剖析。</p>
      </a>
    </div>
    
    <div class="more-hint">
      更多案例陆续发布中...
    </div>
  </div>
  
  <footer>
    <p>© 2026 张大壮律师 | <a href="mailto:376500950@qq.com">376500950@qq.com</a></p>
  </footer>
</body>
</html>
